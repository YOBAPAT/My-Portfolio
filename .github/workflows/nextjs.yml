name: Deploy Next.js

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # This fixes the Node 20 warning by forcing Node 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # This stops Next.js from crashing if there are tiny code errors
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        # 'legacy-peer-deps' fixes 254 errors caused by library conflicts
        run: npm install --legacy-peer-deps
      - name: Build with Next.js
        # We add the 'lint' skip here to prevent 254 crashes
        run: npx next build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
